<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pobfus</title>
    <style>
        :root {
            --bg: #0d1117;
            --border: #30363d;
            --accent: #ff4500;
            --blue: #79c0ff;
            --green: #39ff14;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background-color: #010409; color: #c9d1d9; font-family: "JetBrains Mono", monospace; overflow: hidden; }

        /* --- CORE NOTIF --- */
        #notif-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .core-notif {
            background: rgba(13, 17, 23, 0.98);
            border: 1px solid var(--accent);
            border-left: 4px solid var(--accent);
            color: #fff;
            padding: 12px 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .core-notif.fade-out { animation: slideOut 0.3s ease-in forwards; }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

        /* --- LAYOUT --- */
        .app-wrapper { height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; height: 50px; font-weight: bold; font-size: 12px; }
        .container { display: flex; flex: 1; overflow: hidden; }

        aside { width: 260px; background: #161b22; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .section-title { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        
        /* Language Selector */
        .selector { display: flex; gap: 5px; margin-bottom: 20px; }
        .sel-btn { flex: 1; background: #21262d; border: 1px solid var(--border); color: #8b949e; padding: 8px; font-size: 10px; cursor: pointer; }
        .sel-btn.active { border-color: var(--accent); color: white; }

        .pillar { font-size: 11px; display: flex; align-items: center; gap: 10px; margin-bottom: 12px; color: #8b949e; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #333; }
        .pillar.active .dot { background: var(--green); box-shadow: 0 0 5px var(--green); }
        .pillar.core .dot { background: var(--accent); box-shadow: 0 0 5px var(--accent); }

        .main { display: flex; flex-direction: column; flex: 1; }
        textarea { flex: 1; background: #010409; padding: 20px; font-family: inherit; font-size: 13px; border: none; outline: none; color: var(--blue); resize: none; line-height: 1.5; }
        
        .log-area { height: 180px; background: #000; border-top: 1px solid var(--border); padding: 15px; font-size: 11px; overflow-y: auto; }
        .btn-run { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; margin-top: auto; }
    </style>
</head>
<body>

<div id="notif-container"></div>

<div class="app-wrapper">
    <header>SYSTEM PROTECTION UNIT</header>

    <div class="container">
        <aside>
            <div class="section-title">Architecture</div>
            <div class="selector">
                <button id="btn-lua" class="sel-btn active" onclick="_011.setLang('lua')">LUA</button>
                <button id="btn-luau" class="sel-btn" onclick="_011.setLang('luau')">LUAU</button>
            </div>

            <div class="section-title">Pillars</div>
            <div class="pillar core"><div class="dot"></div>MoonSec V3</div>
            <div class="pillar active"><div class="dot"></div>Prometheus</div>
            <div class="pillar active"><div class="dot"></div>Cambuscate</div>

            <button class="btn-run" onclick="_011._transform()">Initiate Protection</button>
        </aside>

        <div class="main">
            <textarea id="input" placeholder="-- Source Code..."></textarea>
            <textarea id="output-view" readonly style="border-top: 1px solid var(--border);" placeholder="-- Protected Stream..."></textarea>
            <div id="sys-logs" class="log-area"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
